{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — UniStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a25;
      --border: #2a2a3a;
      --text: #e8e8ed;
      --text-muted: #6b6b80;
      --gold: #f59e0b;
      --gold-dim: rgba(245,158,11,0.15);
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background glow */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 50%, rgba(99,102,241,0.03) 0%, transparent 50%);
      animation: bgFloat 15s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgFloat {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-3%, 3%) rotate(2deg); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px 40px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--gold), #d97706);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(245,158,11,0.25);
    }

    .brand-icon svg {
      width: 28px;
      height: 28px;
      color: #000;
    }

    .brand h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .brand p {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #d97706);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(245,158,11,0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .lock-icon {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .lock-icon svg {
      width: 12px;
      height: 12px;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
      </div>
      <h1>UniStock</h1>
      <p>Inventory & POS System</p>
    </div>

    {% if form.errors %}
    <div class="error-msg">
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autofocus required id="id_username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required id="id_password" />
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="login-footer">
      <span class="lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
        Protected Access
      </span>
    </div>
  </div>
</div>

</body>
</html>
